<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Pikachu</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
            color: #333;
        }
        .game-wrapper {
            width: min(960px, calc(100vw - 40px));
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 2.4rem;
            letter-spacing: 1px;
            color: #222;
        }
        .info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .info span {
            background: #fff5cc;
            border: 1px solid #f0c040;
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
            color: #6f4e00;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin: 0 auto;
            max-width: 760px;
        }
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.45s ease;
            border-radius: 18px;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            border-radius: 18px;
            backface-visibility: hidden;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
        }
        .card-front {
            background: linear-gradient(135deg, #fff, #ffebc8);
            font-size: 2.8rem;
        }
        .card-back {
            background: linear-gradient(135deg, #ffcc33, #ff9900);
            transform: rotateY(180deg);
            font-size: 2.2rem;
            color: #fff;
            padding: 12px;
        }
        .card.matched .card-inner {
            transform: rotateY(180deg);
            cursor: default;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.55);
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background: #ff6b6b;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            background: #ff5252;
        }
        .message {
            margin-top: 18px;
            min-height: 1.4em;
            color: #333;
            font-weight: 600;
        }
        .hint {
            font-size: 0.95rem;
            margin: 10px auto 0;
            max-width: 720px;
            color: #5a3d00;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>Game Pikachu</h1>
        <div class="info">
            <span>Lượt mở: <strong id="moves">0</strong></span>
            <span>Đã ghép: <strong id="matches">0</strong> / 8</span>
            <span>Thời gian: <strong id="timer">0</strong> giây</span>
        </div>
        <button id="restartBtn">Chơi lại</button>
        <div class="message" id="message"></div>
        <div class="board" id="board"></div>
        <p class="hint">Mục tiêu: mở 2 ô giống nhau. Khi 8 cặp trùng, bạn thắng!</p>
    </div>

    <script>
        const cards = [
            '⚡', '⚡',
            '🐭', '🐭',
            '🍌', '🍌',
            '🌟', '🌟',
            '🍓', '🍓',
            '🎮', '🎮',
            '💛', '💛',
            '🔥', '🔥'
        ];

        const board = document.getElementById('board');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');
        const timerEl = document.getElementById('timer');
        const messageEl = document.getElementById('message');
        const restartBtn = document.getElementById('restartBtn');

        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;
        let matches = 0;
        let time = 0;
        let timerInterval = null;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startTimer() {
            clearInterval(timerInterval);
            time = 0;
            timerEl.textContent = time;
            timerInterval = setInterval(() => {
                time += 1;
                timerEl.textContent = time;
            }, 1000);
        }

        function createBoard() {
            board.innerHTML = '';
            const shuffled = shuffle([...cards]);
            shuffled.forEach((emoji, index) => {
                const card = document.createElement('button');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${emoji}</div>
                    </div>`;
                card.addEventListener('click', handleCardClick);
                board.appendChild(card);
            });
            moves = 0;
            matches = 0;
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            movesEl.textContent = moves;
            matchesEl.textContent = matches;
            messageEl.textContent = '';
            startTimer();
        }

        function handleCardClick(event) {
            if (lockBoard) return;
            const card = event.currentTarget;
            if (card === firstCard || card.classList.contains('matched')) return;

            card.classList.add('flipped');

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            moves += 1;
            movesEl.textContent = moves;
            checkForMatch();
        }

        function checkForMatch() {
            const match = firstCard.dataset.emoji === secondCard.dataset.emoji;
            if (match) {
                disableCards();
                return;
            }
            unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            matches += 1;
            matchesEl.textContent = matches;
            resetBoard();
            if (matches === cards.length / 2) {
                clearInterval(timerInterval);
                messageEl.textContent = `Chúc mừng! Bạn đã thắng trong ${moves} lượt và ${time} giây.`;
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 900);
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        restartBtn.addEventListener('click', createBoard);

        createBoard();
    </script>
</body>
</html>
